name: CI Pipeline

on:
    push:
        branches: ["main", "dev1"]

jobs:
    test-job:
        name: Run tests
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.14"

            - name: Install dependencies
              run: |
                pip install -r requirements.txt

            - name: Run tests
              run: |
                pytest test_calculator.py -v

    build-push:
      name: Build and push docker image
      runs-on: ubuntu-latest
      needs: ["test-job"] # test-job needs to be successful to run build-push job

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Login to docker hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and push docker image
          uses: docker/build-push-action@v5
          with:
            context: .    #current library se docker file
            push: true
            no-cache: true
            tags: ${{ secrets.DOCKER_USERNAME }}/my-calc-image:latest
            